<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a2a6b">
<title>Gronk OS — Portfolio</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3CradialGradient id='g' cx='35%25' cy='30%25' r='75%25'%3E%3Cstop offset='0' stop-color='%23a8dcff'/%3E%3Cstop offset='.55' stop-color='%231b6fc0'/%3E%3Cstop offset='1' stop-color='%23063064'/%3E%3C/radialGradient%3E%3C/defs%3E%3Ccircle cx='16' cy='16' r='15' fill='url(%23g)'/%3E%3Ctext x='16' y='23' font-family='Segoe UI,Arial' font-size='18' font-weight='bold' fill='white' text-anchor='middle'%3EG%3C/text%3E%3C/svg%3E">

<style>
/* ============ base ============ */
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
    height: 100%;
    overflow: hidden;
}

body {
    font-family: "Segoe UI", "Segoe UI Variable", Tahoma, "Helvetica Neue", Arial, sans-serif;
    font-size: 13px;
    background: #000;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
}

button {
    font: inherit;
    color: inherit;
    background: none;
    border: none;
    cursor: default;
}

img { -webkit-user-drag: none; user-drag: none; }

/* ============ boot screen ============ */
#boot {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 26px;
    transition: opacity .7s ease;
}

#boot.boot-done { opacity: 0; pointer-events: none; }

.boot-stage {
    position: relative;
    width: 150px;
    height: 150px;
    display: grid;
    place-items: center;
}

.boot-orb {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 12px;
    height: 12px;
    margin: -6px 0 0 -6px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff 0%, currentColor 65%);
    box-shadow: 0 0 14px 3px currentColor;
    opacity: 0;
    animation: flyIn 2.6s cubic-bezier(.45,.1,.4,1) forwards;
}

.boot-orb.o1 { color: #ff5a4e; --sx: -42vw; --sy: -24vh; --mx: -10vw; --my:   7vh; }
.boot-orb.o2 { color: #7be05a; --sx:  42vw; --sy: -26vh; --mx:  11vw; --my:   5vh; animation-delay: .12s; }
.boot-orb.o3 { color: #46a8f5; --sx: -38vw; --sy:  26vh; --mx:  -9vw; --my:  -8vh; animation-delay: .22s; }
.boot-orb.o4 { color: #ffd84d; --sx:  40vw; --sy:  28vh; --mx:  10vw; --my:  -7vh; animation-delay: .3s; }

@keyframes flyIn {
    0%   { transform: translate(var(--sx), var(--sy)) scale(.4); opacity: 0; }
    12%  { opacity: 1; }
    55%  { transform: translate(var(--mx), var(--my)) scale(1.05); opacity: 1; }
    85%  { transform: translate(0, 0) scale(.9); opacity: 1; }
    100% { transform: translate(0, 0) scale(.15); opacity: 0; }
}

.boot-logo {
    font-size: 74px;
    font-weight: 700;
    color: #fff;
    opacity: 0;
    text-shadow:
        0 0 16px rgba(140, 200, 255, .95),
        0 0 46px rgba(90, 160, 255, .7),
        0 0 80px rgba(120, 220, 160, .35);
    animation: bloom 1.4s ease 2.45s forwards, breathe 2.4s ease-in-out 4s infinite alternate;
}

@keyframes bloom {
    0%   { opacity: 0; transform: scale(.45); filter: blur(8px); }
    60%  { opacity: 1; transform: scale(1.08); filter: blur(0); }
    100% { opacity: 1; transform: scale(1); }
}

@keyframes breathe {
    to { text-shadow:
        0 0 22px rgba(150, 205, 255, 1),
        0 0 60px rgba(100, 170, 255, .85),
        0 0 110px rgba(130, 225, 170, .5); }
}

.boot-text {
    color: #dcdcdc;
    font-size: 16px;
    letter-spacing: .3px;
    opacity: 0;
    animation: fadeIn 1.2s ease 1.1s forwards;
    text-shadow: 0 0 8px rgba(255,255,255,.25);
}

@keyframes fadeIn { to { opacity: 1; } }

.boot-copy {
    position: absolute;
    bottom: 26px;
    color: #777;
    font-size: 12px;
}

/* ============ desktop / wallpaper ============ */
#desktop {
    position: fixed;
    inset: 0 0 40px 0;
    overflow: hidden;
    cursor: default;
    background:
        radial-gradient(115% 85% at 72% 108%, rgba(140, 215, 255, .38), transparent 62%),
        radial-gradient(85% 65% at 14% 102%, rgba(40, 170, 255, .30), transparent 58%),
        radial-gradient(60% 45% at 88% 30%, rgba(110, 200, 255, .14), transparent 70%),
        linear-gradient(160deg, #071f52 0%, #0c3c86 34%, #1f72bd 68%, #5cb2e4 100%);
}

/* aurora light sweeps */
#desktop::before {
    content: "";
    position: absolute;
    inset: -22%;
    z-index: 0;
    background:
        radial-gradient(42% 56% at 62% 62%, rgba(255,255,255,.16), transparent 70%),
        conic-gradient(from 205deg at 68% 66%,
            transparent 0deg 38deg,
            rgba(150, 215, 255, .17) 62deg,
            transparent 108deg,
            rgba(90, 180, 245, .13) 150deg,
            transparent 205deg,
            rgba(170, 235, 255, .07) 260deg,
            transparent 320deg);
    filter: blur(28px);
    transform: rotate(-9deg);
    pointer-events: none;
}

/* subtle Gronk emblem */
#desktop::after {
    content: "G";
    position: absolute;
    right: 6%;
    top: 46%;
    z-index: 0;
    transform: translateY(-50%);
    font-size: 36vmin;
    font-weight: 700;
    line-height: 1;
    color: rgba(255, 255, 255, .055);
    text-shadow: 0 0 90px rgba(170, 225, 255, .28);
    pointer-events: none;
}

#watermark {
    position: absolute;
    right: 16px;
    bottom: 12px;
    z-index: 1;
    text-align: right;
    color: rgba(255, 255, 255, .55);
    font-size: 11px;
    line-height: 1.45;
    text-shadow: 0 1px 2px rgba(0, 0, 0, .45);
    pointer-events: none;
}

/* ============ desktop icons ============ */
#icons {
    position: absolute;
    inset: 14px;
    z-index: 2;
    display: flex;
    flex-direction: column;
    flex-wrap: wrap;
    align-content: flex-start;
    gap: 4px;
}

.icon {
    width: 98px;
    padding: 9px 4px 7px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
    border: 1px solid transparent;
    border-radius: 3px;
    color: #fff;
}

.icon .thumb {
    width: 56px;
    height: 56px;
    object-fit: cover;
    border: 2px solid rgba(255, 255, 255, .9);
    border-radius: 3px;
    background: #fff;
    box-shadow: 0 2px 5px rgba(0, 0, 0, .55);
}

.icon span {
    font-size: 12px;
    line-height: 1.25;
    text-align: center;
    text-shadow: 0 1px 2px rgba(0, 0, 0, .95), 0 0 5px rgba(0, 0, 0, .6);
    overflow-wrap: anywhere;
}

.icon:hover {
    background: rgba(165, 205, 255, .22);
    border-color: rgba(180, 215, 255, .4);
}

.icon.selected {
    background: rgba(120, 180, 255, .38);
    border-color: rgba(170, 210, 255, .65);
}

/* ============ windows (Aero glass) ============ */
.window {
    position: absolute;
    z-index: 10;
    min-width: 300px;
    min-height: 200px;
    border: 1px solid #122c47;
    border-radius: 7px 7px 5px 5px;
    background: linear-gradient(rgba(188, 213, 238, .72), rgba(148, 184, 217, .62) 60px, rgba(148, 184, 217, .62));
    -webkit-backdrop-filter: blur(12px) saturate(1.4);
    backdrop-filter: blur(12px) saturate(1.4);
    box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, .6),
        0 14px 38px rgba(0, 0, 0, .55),
        0 3px 10px rgba(0, 0, 0, .35);
    opacity: 0;
    visibility: hidden;
    transform: scale(.94) translateY(26px);
    transition: opacity .18s ease, transform .18s ease, visibility .18s;
    outline: none;
}

.window.open:not(.minimized) {
    opacity: 1;
    visibility: visible;
    transform: none;
}

.window:not(.active) {
    border-color: #4f6172;
    background: linear-gradient(rgba(208, 220, 232, .6), rgba(178, 195, 212, .52));
    box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, .45),
        0 8px 22px rgba(0, 0, 0, .35);
}

.window.maximized {
    left: 0 !important;
    top: 0 !important;
    width: 100% !important;
    height: 100% !important;
    border-radius: 0;
    border-left: none;
    border-right: none;
    border-top: none;
}

.titlebar {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 30px;
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 0 110px 0 11px;
    touch-action: none;
    cursor: default;
    overflow: hidden;
}

.t-icon {
    width: 16px;
    height: 16px;
    object-fit: cover;
    border-radius: 2px;
    flex: none;
    box-shadow: 0 0 2px rgba(0,0,0,.5);
}

.t-text {
    font-size: 12.5px;
    color: #16293c;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow:
        0 0 9px rgba(255, 255, 255, 1),
        0 0 4px rgba(255, 255, 255, .95),
        0 1px 0 rgba(255, 255, 255, .6);
}

.window:not(.active) .t-text { color: #4d5d6c; }

/* caption buttons */
.caps {
    position: absolute;
    top: -1px;
    right: 9px;
    z-index: 5;
    display: flex;
}

.cap {
    width: 29px;
    height: 19px;
    display: grid;
    place-items: center;
    border: 1px solid rgba(18, 40, 62, .75);
    border-top: none;
    background: linear-gradient(
        rgba(255, 255, 255, .6),
        rgba(255, 255, 255, .25) 45%,
        rgba(160, 185, 210, .3) 50%,
        rgba(255, 255, 255, .3));
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .5);
}

.cap + .cap { border-left: none; }
.cap.min { border-radius: 0 0 0 4px; }
.cap.close { width: 45px; border-radius: 0 0 4px 0; }

.cap svg { filter: drop-shadow(0 1px 1px rgba(0, 0, 0, .7)); }

.cap:hover {
    background: linear-gradient(
        rgba(220, 240, 255, .95),
        rgba(160, 215, 255, .8) 45%,
        rgba(90, 170, 240, .75) 50%,
        rgba(180, 230, 255, .9));
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .65), 0 0 7px rgba(120, 190, 255, .8);
}

.cap.close:hover {
    background: linear-gradient(
        #f7b0a4,
        #e2654f 45%,
        #c33b22 50%,
        #e88a70);
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .6), 0 0 8px rgba(230, 90, 60, .9);
}

.cap:active { filter: brightness(.82); }
.window:not(.active) .cap { opacity: .8; }

.window .i-restore { display: none; }
.window.maximized .i-restore { display: block; }
.window.maximized .i-max { display: none; }

/* window content */
.win-body {
    position: absolute;
    inset: 30px 8px 8px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #fff;
    border: 1px solid rgba(10, 30, 50, .55);
    box-shadow: 0 0 0 1px rgba(255, 255, 255, .35);
}

.window.maximized .win-body { inset: 30px 0 0; border-left: none; border-right: none; border-bottom: none; }

.viewer {
    flex: 1;
    overflow: auto;
    display: grid;
    place-items: center;
    padding: 14px;
    background: #eef2f7;
}

.viewer img {
    max-width: 100%;
    max-height: 100%;
    box-shadow: 0 3px 14px rgba(20, 40, 60, .3);
    background: #fff;
}

.win-info {
    flex: none;
    padding: 11px 16px 13px;
    background: linear-gradient(#fdfeff, #edf2f8);
    border-top: 1px solid #d6dee8;
    -webkit-user-select: text;
    user-select: text;
}

.win-info h2 {
    font-size: 15px;
    font-weight: 600;
    color: #1d3b57;
    margin-bottom: 2px;
}

.win-info p { color: #5b6b7b; font-size: 12.5px; }

.grip {
    position: absolute;
    right: 1px;
    bottom: 1px;
    width: 18px;
    height: 18px;
    cursor: nwse-resize;
    touch-action: none;
    background:
        repeating-linear-gradient(135deg,
            transparent 0 4px,
            rgba(20, 45, 70, .45) 4px 5.5px,
            rgba(255, 255, 255, .5) 5.5px 7px);
    clip-path: polygon(100% 0, 100% 100%, 0 100%);
    border-bottom-right-radius: 4px;
}

.window.maximized .grip { display: none; }

/* ============ taskbar ============ */
#taskbar {
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: 40px;
    z-index: 5000;
    display: flex;
    align-items: center;
    padding-right: 2px;
    background: linear-gradient(
        rgba(90, 110, 140, .62),
        rgba(40, 55, 80, .72) 38%,
        rgba(16, 24, 42, .82) 95%);
    -webkit-backdrop-filter: blur(11px) saturate(1.3);
    backdrop-filter: blur(11px) saturate(1.3);
    border-top: 1px solid rgba(150, 180, 215, .45);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, .14);
}

/* start orb */
#orb {
    position: relative;
    top: -5px;
    flex: none;
    width: 50px;
    height: 50px;
    margin: 0 4px 0 6px;
    border-radius: 50%;
    border: 1px solid rgba(2, 16, 34, .85);
    background:
        radial-gradient(circle at 50% 18%, rgba(255, 255, 255, .95), rgba(255, 255, 255, 0) 38%),
        radial-gradient(circle at 50% 55%, #43a0e8 0%, #135ea8 55%, #06407e 80%, #032b58 100%);
    box-shadow:
        inset 0 2px 4px rgba(255, 255, 255, .65),
        inset 0 -5px 9px rgba(0, 10, 30, .65),
        0 2px 6px rgba(0, 0, 0, .6);
    display: grid;
    place-items: center;
    font-size: 24px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 0 7px rgba(190, 230, 255, .95), 0 1px 2px rgba(0, 20, 40, .8);
}

#orb:hover { filter: brightness(1.22); }
#orb:active, #orb[aria-expanded="true"] { filter: brightness(.95); }

/* taskbar window buttons */
#taskbtns {
    flex: 1;
    min-width: 0;
    height: 100%;
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 0 4px;
    overflow-x: auto;
    scrollbar-width: none;
}
#taskbtns::-webkit-scrollbar { display: none; }

.taskbtn {
    flex: none;
    width: 60px;
    height: 33px;
    display: grid;
    place-items: center;
    border: 1px solid transparent;
    border-radius: 3px;
}

.taskbtn img {
    width: 34px;
    height: 24px;
    object-fit: cover;
    border-radius: 2px;
    box-shadow: 0 0 3px rgba(0, 0, 0, .8);
}

.taskbtn:hover {
    background: rgba(200, 225, 255, .22);
    border-color: rgba(200, 225, 255, .4);
}

.taskbtn.active {
    background: linear-gradient(rgba(225, 240, 255, .34), rgba(120, 160, 210, .18) 50%, rgba(225, 240, 255, .12));
    border-color: rgba(8, 18, 32, .8);
    box-shadow: inset 0 1px 4px rgba(0, 8, 20, .55), inset 0 0 0 1px rgba(210, 230, 255, .3);
}

/* tray */
#tray {
    flex: none;
    height: 100%;
    display: flex;
    align-items: center;
    padding: 0 11px;
    text-align: center;
    color: #f2f6fb;
    font-size: 11px;
    line-height: 1.4;
    text-shadow: 0 1px 2px rgba(0, 0, 0, .7);
}

#showdesk {
    flex: none;
    width: 13px;
    height: 100%;
    border-left: 1px solid rgba(160, 190, 220, .5);
    background: rgba(255, 255, 255, .06);
    box-shadow: inset 1px 0 0 rgba(0, 0, 0, .4);
}
#showdesk:hover { background: rgba(220, 240, 255, .28); }

/* ============ start menu ============ */
#startmenu {
    position: fixed;
    left: 4px;
    bottom: 46px;
    z-index: 6000;
    width: min(430px, calc(100vw - 8px));
    display: grid;
    grid-template-columns: 1fr 158px;
    gap: 7px;
    padding: 7px;
    border: 1px solid rgba(8, 22, 40, .9);
    border-radius: 8px;
    background: linear-gradient(rgba(110, 135, 170, .68), rgba(34, 50, 78, .8) 45%, rgba(14, 24, 44, .86));
    -webkit-backdrop-filter: blur(13px) saturate(1.3);
    backdrop-filter: blur(13px) saturate(1.3);
    box-shadow:
        inset 0 0 0 1px rgba(255, 255, 255, .3),
        0 12px 36px rgba(0, 0, 0, .6);
    opacity: 0;
    visibility: hidden;
    transform: translateY(12px);
    transition: opacity .16s ease, transform .16s ease, visibility .16s;
}

#startmenu.open {
    opacity: 1;
    visibility: visible;
    transform: none;
}

.sm-left {
    display: flex;
    flex-direction: column;
    min-height: 330px;
    max-height: min(440px, calc(100vh - 120px));
    background: #fff;
    border: 1px solid rgba(10, 28, 48, .6);
    border-radius: 4px;
    padding: 5px;
}

.sm-head {
    font-size: 11px;
    color: #6b7b8b;
    padding: 5px 9px 6px;
    border-bottom: 1px solid #e4e9ef;
    margin-bottom: 4px;
}

.sm-apps { flex: 1; overflow-y: auto; }

.sm-app {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 5px 8px;
    border: 1px solid transparent;
    border-radius: 3px;
    text-align: left;
    color: #1d2b3a;
    font-size: 13px;
}

.sm-app img {
    width: 28px;
    height: 28px;
    object-fit: cover;
    border-radius: 2px;
    flex: none;
    box-shadow: 0 0 2px rgba(0, 0, 0, .4);
}

.sm-app:hover, .sm-app:focus-visible {
    background: linear-gradient(#f2f8fe, #d7eafc);
    border-color: #b8d7f5;
}

.sm-search {
    margin-top: 5px;
    padding: 4px 2px 2px;
    border-top: 1px solid #e4e9ef;
}

.sm-search input {
    width: 100%;
    font: inherit;
    font-size: 12.5px;
    padding: 5px 12px;
    border: 1px solid #9eb4c8;
    border-radius: 13px;
    background: #fdfeff;
    color: #223;
    outline: none;
    box-shadow: inset 0 1px 3px rgba(40, 70, 100, .18);
    -webkit-user-select: text;
    user-select: text;
}

.sm-search input:focus { border-color: #5d9bd6; box-shadow: 0 0 5px rgba(100, 170, 230, .5); }

.sm-right {
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding: 6px 2px 2px;
    color: #eef4fa;
}

.sm-user {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 7px;
    padding: 4px 0 12px;
    text-align: center;
}

.sm-avatar {
    width: 58px;
    height: 58px;
    display: grid;
    place-items: center;
    font-size: 30px;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 0 8px rgba(190, 230, 255, .9);
    border: 2px solid rgba(255, 255, 255, .85);
    border-radius: 6px;
    background:
        radial-gradient(circle at 50% 20%, rgba(255, 255, 255, .8), rgba(255, 255, 255, 0) 42%),
        linear-gradient(150deg, #3f9be2, #0c4d92 70%, #063468);
    box-shadow: 0 3px 9px rgba(0, 0, 0, .5);
}

.sm-user b { font-size: 13px; text-shadow: 0 1px 2px rgba(0, 0, 0, .6); }
.sm-user small { color: #b9c9da; font-size: 11px; line-height: 1.35; text-shadow: 0 1px 2px rgba(0,0,0,.5); }

.sm-link {
    display: block;
    padding: 6px 9px;
    border: 1px solid transparent;
    border-radius: 3px;
    color: #eef4fa;
    text-decoration: none;
    font-size: 12.5px;
    text-shadow: 0 1px 2px rgba(0, 0, 0, .55);
}

.sm-link:hover, .sm-link:focus-visible {
    background: rgba(200, 225, 255, .22);
    border-color: rgba(200, 225, 255, .35);
}

.sm-foot {
    margin-top: auto;
    padding: 8px 9px 4px;
    color: #93a6ba;
    font-size: 10.5px;
    text-shadow: 0 1px 1px rgba(0, 0, 0, .5);
}

/* ============ small screens ============ */
@media (max-width: 700px) {
    #icons { inset: 10px; gap: 2px; }
    .icon { width: 82px; }
    .icon .thumb { width: 48px; height: 48px; }
    #startmenu { grid-template-columns: 1fr; }
    .sm-right { display: none; }
    .sm-left { min-height: 0; max-height: calc(100vh - 130px); }
    #watermark { display: none; }
}

/* ============ no-JS fallback ============ */
.noscript {
    position: fixed;
    inset: 0;
    z-index: 99999;
    overflow: auto;
    background: #f4f6f9;
    color: #222;
    padding: 40px 20px;
    -webkit-user-select: text;
    user-select: text;
}
.noscript > div { max-width: 640px; margin: 0 auto; }
.noscript h1 { font-size: 1.4rem; margin-bottom: 8px; }
.noscript ul { margin: 18px 0 0 0; list-style: none; }
.noscript li { margin-bottom: 26px; }
.noscript img { max-width: 100%; height: auto; border-radius: 6px; }
.noscript h2 { font-size: 1.05rem; margin: 8px 0 2px; }

/* ============ reduced motion ============ */
@media (prefers-reduced-motion: reduce) {
    .boot-orb { display: none; }
    .boot-logo { animation: none; opacity: 1; }
    .boot-text { animation: none; opacity: 1; }
    .window, #startmenu, #boot { transition: none; }
}
</style>
</head>
<body>

<noscript>
    <div class="noscript">
        <div>
            <h1>Gronk OS could not start: JavaScript is disabled.</h1>
            <p>Here is the plain portfolio instead — Gronk Design: print and digital design, branding, visual experience.</p>
            <ul>
                <li><img src="Project1.jpg" alt="Poster: Good NEWs Project"><h2>Good NEWs</h2><p>Identity and visual design.</p></li>
                <li><img src="Project2.jpg" alt="Newspaper layout"><h2>Newspaper</h2><p>Exhibition item design and binding.</p></li>
                <li><img src="Chaotic%20Gradients%20-%2010.jpg" alt="Project Three"><h2>Project Three</h2><p>Packaging and product presentation.</p></li>
                <li><img src="IMG_2469.jpg" alt="Project Four"><h2>Project Four</h2><p>Website redesign and visual system.</p></li>
                <li><img src="bruecke.jpg" alt="Project Five"><h2>Project Five</h2><p>Editorial and publication design.</p></li>
                <li><img src="slother.jpg" alt="Project Six"><h2>Project Six</h2><p>Creative concept and digital campaign.</p></li>
            </ul>
            <p>© 2026 Gronk Design • Portfolio</p>
        </div>
    </div>
</noscript>

<div id="boot" hidden role="status" aria-label="Gronk OS is starting">
    <div class="boot-stage">
        <div class="boot-orb o1"></div>
        <div class="boot-orb o2"></div>
        <div class="boot-orb o3"></div>
        <div class="boot-orb o4"></div>
        <div class="boot-logo">G</div>
    </div>
    <div class="boot-text">Starting Gronk&nbsp;OS</div>
    <div class="boot-copy">© Gronk Corporation</div>
</div>

<main id="desktop" aria-label="Gronk OS desktop">
    <div id="icons"></div>
    <div id="watermark">Gronk OS 7 Ultimate<br>Build 2026 — Portfolio Edition</div>
</main>

<nav id="startmenu" aria-label="Start menu">
    <div class="sm-left">
        <div class="sm-head">Projects</div>
        <div class="sm-apps" id="smApps"></div>
        <div class="sm-search">
            <input id="smSearch" type="search" placeholder="Search projects" aria-label="Search projects">
        </div>
    </div>
    <div class="sm-right">
        <div class="sm-user">
            <div class="sm-avatar" aria-hidden="true">G</div>
            <b>Gronk Design</b>
            <small>Print &amp; digital design, branding, visual experience.</small>
        </div>
        <a class="sm-link" href="/">Home</a>
        <a class="sm-link" href="https://github.com/gronk-io" target="_blank" rel="noopener">GitHub</a>
        <div class="sm-foot">© 2026 Gronk Design</div>
    </div>
</nav>

<footer id="taskbar">
    <button id="orb" aria-label="Start" aria-expanded="false" aria-controls="startmenu">G</button>
    <div id="taskbtns" role="group" aria-label="Open windows"></div>
    <div id="tray"><span id="trayTime">--:--</span><br><span id="trayDate"></span></div>
    <button id="showdesk" aria-label="Show desktop" title="Show desktop"></button>
</footer>

<script>
(() => {
'use strict';

const $ = s => document.querySelector(s);
const desk = $('#desktop');
const iconsEl = $('#icons');
const tbBtns = $('#taskbtns');
const startMenu = $('#startmenu');
const orb = $('#orb');
const smApps = $('#smApps');
const smSearch = $('#smSearch');

const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
const coarse = matchMedia('(pointer: coarse)');
const isSmall = () => innerWidth <= 700;

const PROJECTS = [
    { id: 'goodnews',  title: 'Good NEWs',     desc: 'Identity and visual design.',           alt: 'Poster: Good NEWs Project', img: 'Project1.jpg',                  thumb: 'Project1.jpg' },
    { id: 'newspaper', title: 'Newspaper',     desc: 'Exhibition item design and binding.',   alt: 'Newspaper layout',          img: 'Project2.jpg',                  thumb: 'Project2.jpg' },
    { id: 'three',     title: 'Project Three', desc: 'Packaging and product presentation.',   alt: 'Project Three',             img: 'Chaotic Gradients - 10.jpg',    thumb: 'Chaotic Gradients - 10.jpg' },
    { id: 'four',      title: 'Project Four',  desc: 'Website redesign and visual system.',   alt: 'Project Four',              img: 'IMG_2469.jpg',                  thumb: 'IMG_2469.jpg' },
    { id: 'five',      title: 'Project Five',  desc: 'Editorial and publication design.',     alt: 'Project Five',              img: 'bruecke.jpg',                   thumb: 'bruecke.jpg' },
    { id: 'six',       title: 'Project Six',   desc: 'Creative concept and digital campaign.', alt: 'Project Six',              img: 'slother.jpg',                   thumb: 'slother.jpg' }
];

/* ---------- boot screen (once per browser session) ---------- */
const boot = $('#boot');
let alreadyBooted = false;
try { alreadyBooted = sessionStorage.getItem('gronkos-booted') === '1'; } catch (e) {}

if (alreadyBooted) {
    boot.remove();
} else {
    boot.hidden = false;
    const finish = () => {
        if (!boot.isConnected || boot.classList.contains('boot-done')) return;
        try { sessionStorage.setItem('gronkos-booted', '1'); } catch (e) {}
        boot.classList.add('boot-done');
        setTimeout(() => boot.remove(), 750);
    };
    const timer = setTimeout(finish, reduceMotion ? 1600 : 4500);
    const skip = () => { clearTimeout(timer); finish(); };
    boot.addEventListener('pointerdown', skip);
    addEventListener('keydown', skip, { once: true });
}

/* ---------- window manager ---------- */
const wins = new Map();   // id -> { p, el, btn }
let zTop = 10;
let cascade = 0;

const ICONS = {
    min: '<svg viewBox="0 0 10 10" width="10" height="10" aria-hidden="true"><rect x="1" y="6.5" width="8" height="2.5" fill="#fff"/></svg>',
    max: '<svg class="i-max" viewBox="0 0 10 10" width="10" height="10" aria-hidden="true"><rect x="1.25" y="1.75" width="7.5" height="6.5" fill="none" stroke="#fff" stroke-width="1.5"/></svg>'
       + '<svg class="i-restore" viewBox="0 0 10 10" width="10" height="10" aria-hidden="true"><path d="M3.2 2.8V1.2h5.6v5h-1.6" fill="none" stroke="#fff" stroke-width="1.2"/><rect x="1.2" y="3.4" width="5.4" height="5.2" fill="none" stroke="#fff" stroke-width="1.2"/></svg>',
    close: '<svg viewBox="0 0 10 10" width="10" height="10" aria-hidden="true"><path d="M1.6 1.6 8.4 8.4 M8.4 1.6 1.6 8.4" stroke="#fff" stroke-width="1.6" stroke-linecap="round" fill="none"/></svg>'
};

function focusWindow(w) {
    wins.forEach(o => {
        o.el.classList.remove('active');
        if (o.btn) o.btn.classList.remove('active');
    });
    w.el.classList.add('active');
    if (w.btn && !w.el.classList.contains('minimized')) w.btn.classList.add('active');
    w.el.style.zIndex = ++zTop;
}

function placeWindow(el) {
    if (el.dataset.placed) return;
    el.dataset.placed = '1';
    const W = Math.min(720, desk.clientWidth - 16);
    const H = Math.min(540, desk.clientHeight - 16);
    const off = (cascade++ % 6) * 26;
    el.style.width = W + 'px';
    el.style.height = H + 'px';
    el.style.left = Math.min(Math.max(8, (desk.clientWidth - W) / 2 - 70 + off), Math.max(8, desk.clientWidth - W - 8)) + 'px';
    el.style.top = Math.min(Math.max(8, (desk.clientHeight - H) / 2 - 36 + off), Math.max(8, desk.clientHeight - H - 8)) + 'px';
}

function openApp(id) {
    const w = wins.get(id);
    if (!w) return;
    const el = w.el;
    if (!el.classList.contains('open')) {
        if (!w.btn) w.btn = makeTaskBtn(w);
        placeWindow(el);
        if (isSmall()) el.classList.add('maximized');
        void el.offsetWidth;   // flush styles so the open transition plays
        el.classList.add('open');
    }
    el.classList.remove('minimized');
    focusWindow(w);
    el.focus({ preventScroll: true });
}

function minimizeApp(w) {
    w.el.classList.add('minimized');
    w.el.classList.remove('active');
    if (w.btn) w.btn.classList.remove('active');
}

function toggleMax(w) {
    w.el.classList.toggle('maximized');
    focusWindow(w);
}

function closeApp(w) {
    w.el.classList.remove('open', 'minimized', 'maximized');
    delete w.el.dataset.placed;
    if (w.btn) { w.btn.remove(); w.btn = null; }
}

function makeTaskBtn(w) {
    const b = document.createElement('button');
    b.className = 'taskbtn';
    b.title = w.p.title;
    b.setAttribute('aria-label', w.p.title);
    b.innerHTML = '<img src="' + encodeURI(w.p.thumb) + '" alt="">';
    b.addEventListener('click', () => {
        const el = w.el;
        if (el.classList.contains('minimized')) {
            el.classList.remove('minimized');
            focusWindow(w);
        } else if (el.classList.contains('active')) {
            minimizeApp(w);
        } else {
            focusWindow(w);
        }
    });
    tbBtns.append(b);
    return b;
}

function makeDraggable(w) {
    const el = w.el;
    const bar = el.querySelector('.titlebar');
    let dragging = false, px = 0, py = 0, ox = 0, oy = 0;

    bar.addEventListener('pointerdown', e => {
        if (el.classList.contains('maximized')) return;
        dragging = true;
        bar.setPointerCapture(e.pointerId);
        px = e.clientX; py = e.clientY;
        ox = el.offsetLeft; oy = el.offsetTop;
    });
    bar.addEventListener('pointermove', e => {
        if (!dragging) return;
        const x = ox + e.clientX - px;
        const y = oy + e.clientY - py;
        el.style.left = Math.min(Math.max(x, 90 - el.offsetWidth), desk.clientWidth - 90) + 'px';
        el.style.top = Math.min(Math.max(y, 0), desk.clientHeight - 34) + 'px';
    });
    const stop = () => { dragging = false; };
    bar.addEventListener('pointerup', stop);
    bar.addEventListener('pointercancel', stop);
    bar.addEventListener('dblclick', e => {
        if (!e.target.closest('.cap')) toggleMax(w);
    });
}

function makeResizable(w) {
    const el = w.el;
    const grip = el.querySelector('.grip');
    let resizing = false, px = 0, py = 0, sw = 0, sh = 0;

    grip.addEventListener('pointerdown', e => {
        resizing = true;
        grip.setPointerCapture(e.pointerId);
        px = e.clientX; py = e.clientY;
        sw = el.offsetWidth; sh = el.offsetHeight;
        focusWindow(w);
    });
    grip.addEventListener('pointermove', e => {
        if (!resizing) return;
        el.style.width = Math.min(Math.max(300, sw + e.clientX - px), desk.clientWidth) + 'px';
        el.style.height = Math.min(Math.max(200, sh + e.clientY - py), desk.clientHeight) + 'px';
    });
    const stop = () => { resizing = false; };
    grip.addEventListener('pointerup', stop);
    grip.addEventListener('pointercancel', stop);
}

function createWindow(p) {
    const el = document.createElement('section');
    el.className = 'window';
    el.tabIndex = -1;
    el.setAttribute('role', 'dialog');
    el.setAttribute('aria-label', p.title);
    el.innerHTML =
        '<header class="titlebar">' +
            '<img class="t-icon" src="' + encodeURI(p.thumb) + '" alt="">' +
            '<span class="t-text">' + p.title + ' — Gronk Viewer</span>' +
        '</header>' +
        '<div class="caps">' +
            '<button class="cap min" aria-label="Minimize">' + ICONS.min + '</button>' +
            '<button class="cap max" aria-label="Maximize">' + ICONS.max + '</button>' +
            '<button class="cap close" aria-label="Close">' + ICONS.close + '</button>' +
        '</div>' +
        '<div class="win-body">' +
            '<div class="viewer"><img src="' + encodeURI(p.img) + '" alt="' + p.alt + '" loading="lazy"></div>' +
            '<div class="win-info"><h2>' + p.title + '</h2><p>' + p.desc + '</p></div>' +
        '</div>' +
        '<div class="grip" aria-hidden="true"></div>';

    const w = { p, el, btn: null };
    el.addEventListener('pointerdown', () => focusWindow(w));
    el.querySelector('.cap.min').addEventListener('click', () => minimizeApp(w));
    el.querySelector('.cap.max').addEventListener('click', () => toggleMax(w));
    el.querySelector('.cap.close').addEventListener('click', () => closeApp(w));
    makeDraggable(w);
    makeResizable(w);
    desk.append(el);
    return w;
}

/* ---------- desktop icons + start menu entries ---------- */
let selectedIcon = null;
function selectIcon(ic) {
    if (selectedIcon) selectedIcon.classList.remove('selected');
    selectedIcon = ic;
    if (ic) ic.classList.add('selected');
}

PROJECTS.forEach(p => {
    wins.set(p.id, createWindow(p));

    const ic = document.createElement('button');
    ic.className = 'icon';
    ic.title = p.title;
    ic.innerHTML = '<img class="thumb" src="' + encodeURI(p.thumb) + '" alt=""><span>' + p.title + '</span>';
    ic.addEventListener('click', e => {
        if (e.detail === 0 || coarse.matches) {   // keyboard or touch: open directly
            selectIcon(ic);
            openApp(p.id);
        } else {
            selectIcon(ic);
        }
    });
    ic.addEventListener('dblclick', () => openApp(p.id));
    iconsEl.append(ic);

    const row = document.createElement('button');
    row.className = 'sm-app';
    row.dataset.t = p.title.toLowerCase();
    row.innerHTML = '<img src="' + encodeURI(p.thumb) + '" alt=""><span>' + p.title + '</span>';
    row.addEventListener('click', () => { closeStart(); openApp(p.id); });
    smApps.append(row);
});

desk.addEventListener('pointerdown', e => {
    if (e.target === desk || e.target === iconsEl) selectIcon(null);
});

/* ---------- start menu ---------- */
function openStart() {
    startMenu.classList.add('open');
    orb.setAttribute('aria-expanded', 'true');
    if (!coarse.matches) smSearch.focus();
}
function closeStart() {
    startMenu.classList.remove('open');
    orb.setAttribute('aria-expanded', 'false');
    smSearch.value = '';
    filterApps();
}
orb.addEventListener('click', () => {
    startMenu.classList.contains('open') ? closeStart() : openStart();
});
document.addEventListener('pointerdown', e => {
    if (startMenu.classList.contains('open') &&
        !e.target.closest('#startmenu') && !e.target.closest('#orb')) closeStart();
});
addEventListener('keydown', e => {
    if (e.key === 'Escape' && startMenu.classList.contains('open')) closeStart();
});

function filterApps() {
    const q = smSearch.value.trim().toLowerCase();
    smApps.querySelectorAll('.sm-app').forEach(b => { b.hidden = !!q && !b.dataset.t.includes(q); });
}
smSearch.addEventListener('input', filterApps);

/* ---------- taskbar extras ---------- */
$('#showdesk').addEventListener('click', () => {
    wins.forEach(w => {
        if (w.el.classList.contains('open') && !w.el.classList.contains('minimized')) minimizeApp(w);
    });
});

const trayTime = $('#trayTime');
const trayDate = $('#trayDate');
function tick() {
    const d = new Date();
    trayTime.textContent = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    trayDate.textContent = d.toLocaleDateString();
}
tick();
setInterval(tick, 1000);

/* keep floating windows reachable when the viewport shrinks */
addEventListener('resize', () => {
    wins.forEach(w => {
        const el = w.el;
        if (!el.classList.contains('open') || el.classList.contains('maximized')) return;
        el.style.left = Math.min(Math.max(el.offsetLeft, 90 - el.offsetWidth), Math.max(0, desk.clientWidth - 90)) + 'px';
        el.style.top = Math.min(Math.max(el.offsetTop, 0), Math.max(0, desk.clientHeight - 34)) + 'px';
    });
});
})();
</script>

</body>
</html>
