<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Glass Demo</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
        radial-gradient(circle at 15% 20%, #ff6b6b 0%, transparent 25%),
        radial-gradient(circle at 80% 25%, #00d2ff 0%, transparent 30%),
        radial-gradient(circle at 50% 80%, #7b61ff 0%, transparent 35%),
        #0b1020;
}

/* Animated background blobs */

.blob{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    opacity:.8;
    animation:float 12s ease-in-out infinite;
}

.blob:nth-child(1){
    width:350px;
    height:350px;
    background:#ff6b6b;
    left:5%;
    top:10%;
}

.blob:nth-child(2){
    width:300px;
    height:300px;
    background:#00d2ff;
    right:10%;
    top:15%;
    animation-delay:-4s;
}

.blob:nth-child(3){
    width:400px;
    height:400px;
    background:#7b61ff;
    bottom:0;
    left:35%;
    animation-delay:-8s;
}

@keyframes float{
    0%,100%{
        transform:translate(0,0);
    }
    50%{
        transform:translate(50px,-40px);
    }
}

/* Liquid glass card */

.glass{
    position:relative;

    width:450px;
    height:280px;

    border-radius:40px;

    background:
        linear-gradient(
            135deg,
            rgba(255,255,255,.22),
            rgba(255,255,255,.06)
        );

    backdrop-filter:blur(25px);
    -webkit-backdrop-filter:blur(25px);

    border:1px solid rgba(255,255,255,.25);

    box-shadow:
        inset 0 1px 1px rgba(255,255,255,.6),
        inset 0 -10px 30px rgba(255,255,255,.05),
        0 30px 80px rgba(0,0,0,.4);

    overflow:hidden;

    filter:url(#liquid);

    transform-style:preserve-3d;
    transition:transform .1s linear;
}

.glass::before{
    content:"";
    position:absolute;
    inset:0;

    background:
        linear-gradient(
            180deg,
            rgba(255,255,255,.35),
            transparent 35%
        );

    pointer-events:none;
}

.glass::after{
    content:"";

    position:absolute;

    width:250px;
    height:250px;

    border-radius:50%;

    background:
        radial-gradient(
            circle,
            rgba(255,255,255,.5),
            transparent 70%
        );

    left:-80px;
    top:-120px;

    filter:blur(20px);

    animation:shine 8s ease-in-out infinite;
}

@keyframes shine{
    0%,100%{
        transform:translateX(0);
    }
    50%{
        transform:translateX(140px);
    }
}

.content{
    position:absolute;
    inset:0;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    color:white;
    text-align:center;
    z-index:5;
}

.content h1{
    font-size:3rem;
    font-family:sans-serif;
    letter-spacing:2px;
}

.content p{
    margin-top:12px;
    font-family:sans-serif;
    opacity:.85;
}
</style>
</head>
<body>

<div class="blob"></div>
<div class="blob"></div>
<div class="blob"></div>

<!-- SVG liquid distortion filter -->
<svg width="0" height="0">
    <filter id="liquid">
        <feTurbulence
            id="noise"
            type="fractalNoise"
            baseFrequency="0.01 0.02"
            numOctaves="2"
            seed="2"
        />
        <feDisplacementMap
            in="SourceGraphic"
            scale="25"
        />
    </filter>
</svg>

<div class="glass" id="glass">
    <div class="content">
        <h1>Liquid Glass</h1>
        <p>Interactive Refraction Effect</p>
    </div>
</div>

<script>
const noise = document.getElementById("noise");
const glass = document.getElementById("glass");

let time = 0;

function animate(){
    time += 0.01;

    const x = 0.01 + Math.sin(time) * 0.003;
    const y = 0.02 + Math.cos(time * 0.8) * 0.003;

    noise.setAttribute(
        "baseFrequency",
        `${x} ${y}`
    );

    requestAnimationFrame(animate);
}

animate();

document.addEventListener("mousemove", e => {

    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;

    const dx = (e.clientX - cx) / cx;
    const dy = (e.clientY - cy) / cy;

    glass.style.transform =
        `rotateY(${dx * 10}deg)
         rotateX(${-dy * 10}deg)`;
});
</script>

</body>
</html>
